<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>404 — Carson Shaffer</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.css">
  <style>
    @media (max-width: 760px) {
      body { align-items: center; }
    }
    .not-found {
      text-align: center;
      max-width: 480px;
    }
    .not-found h1 {
      font-size: clamp(72px, 14vw, 104px);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 16px;
    }
    .not-found p {
      color: var(--muted);
      font-style: italic;
      font-size: 16px;
      margin-bottom: 28px;
    }
  </style>
</head>
<body>
  <div class="not-found">
    <h1>404</h1>
    <p>Page not found.</p>
    <a href="/">Return home</a>
  </div>
</body>
</html>
